<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saffron Food POS</title>
    <style>
        :root {
            --baby-pink: #fce4ec;
            --deep-pink: #d81b60;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark-bg); color: white; padding-bottom: 80px; }

        /* --- LOGIN OVERLAY (Existing) --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .login-box { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .login-btn { background: var(--deep-pink); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; width: 100%; }

        /* --- COMPACT HEADER --- */
        header { 
            background-color: var(--baby-pink); 
            padding: 10px 0; 
            text-align: center; 
            border-bottom-left-radius: 20px; 
            border-bottom-right-radius: 20px; 
            color: var(--deep-pink); 
        }
        header h1 { font-size: 1.4rem; margin: 0; font-weight: bold; }

        /* --- ROUNDED SEARCH BAR (Transparent Background) --- */
        .search-container {
            padding: 12px 15px;
            background-color: transparent;
            width: 100%;
        }
        .search-wrapper {
            display: flex;
            align-items: center;
            background: #ffffff;
            border-radius: 25px; /* Round Corners */
            padding: 8px 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .search-wrapper input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            margin-left: 10px;
            background: transparent;
            color: #333;
        }

        /* --- MENU LAYOUT (Existing) --- */
        .category-title { color: #ffd700; padding: 15px; font-size: 1.2rem; border-bottom: 1px solid #333; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 15px; }
        .menu-item { 
            background: var(--card-bg); border-radius: 12px; padding: 12px; 
            display: flex; flex-direction: column; justify-content: space-between; 
        }
        .item-name { font-weight: bold; margin-bottom: 5px; }
        .item-price { color: #ffd700; font-size: 0.9rem; }
        .add-btn { background: var(--deep-pink); border: none; color: white; padding: 5px; border-radius: 5px; margin-top: 10px; cursor: pointer; }

        /* --- FOOTER & CART TRIGGER --- */
        .view-cart-trigger {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--deep-pink); padding: 12px 30px; border-radius: 30px;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.4); cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <!-- Login System -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-bottom:15px;">STAFF LOGIN</h2>
            <input type="text" id="user-id" placeholder="User ID">
            <input type="password" id="user-pass" placeholder="Password">
            <button class="login-btn" onclick="checkLogin()">LOGIN</button>
            <p id="login-error" style="color: #ff5252; margin-top: 15px; font-size: 0.9rem; display: none;">Invalid Credentials!</p>
        </div>
    </div>

    <div class="app-container">
        <!-- Compact Header -->
        <header>
            <h1>SAFFRON FOOD</h1>
        </header>

        <!-- Round Shape Search Bar -->
        <div class="search-container">
            <div class="search-wrapper">
                <span>🔍</span>
                <input type="text" id="menu-search" placeholder="Search for dishes..." onkeyup="filterMenu()">
            </div>
        </div>

        <div id="menu-container"></div>

        <div class="view-cart-trigger" onclick="toggleCart(true)">
            View Cart (<span id="cart-count">0</span>)
        </div>
    </div>

    <script>
        // Existing Login Logic
        function checkLogin() {
            const user = document.getElementById('user-id').value;
            const pass = document.getElementById('user-pass').value;
            if (user === "Saffron" && pass === "258000") {
                document.getElementById('login-overlay').style.display = 'none';
                sessionStorage.setItem('isLoggedIn', 'true');
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // Full 37 Items Data
        const menuData = [
            { category: "APPETIZERS", items: [
                { id: 1, name: "Aloo tikki burger", price: 39 },
                { id: 2, name: "Classic veg burger", price: 49 },
                { id: 3, name: "Veg cheese burger", price: 59 },
                { id: 4, name: "Double patty veg burger", price: 79 },
                { id: 5, name: "Saffron Burger", price: 99 }
            ]},
            // ... (बाकी के 32 आइटम्स यहाँ आएंगे)
        ];

        // Render Menu
        function renderMenu() {
            const container = document.getElementById('menu-container');
            menuData.forEach(cat => {
                let html = `<div class="category-title">${cat.category}</div><div class="menu-grid">`;
                cat.items.forEach(item => {
                    html += `
                        <div class="menu-item">
                            <div>
                                <div class="item-name">${item.name}</div>
                                <div class="item-price">₹${item.price}</div>
                            </div>
                            <button class="add-btn" onclick="addToCart(${item.id}, '${item.name}', ${item.price})">ADD</button>
                        </div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        // Search Filter Logic
        function filterMenu() {
            const query = document.getElementById('menu-search').value.toLowerCase();
            const items = document.querySelectorAll('.menu-item');
            items.forEach(item => {
                const name = item.querySelector('.item-name').innerText.toLowerCase();
                item.style.display = name.includes(query) ? "flex" : "none";
            });
        }

        window.onload = () => {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
            }
            renderMenu();
        };

        // Cart & WhatsApp Logic (Existing)
        let cart = [];
        function addToCart(id, name, price) {
            cart.push({id, name, price});
            document.getElementById('cart-count').innerText = cart.length;
        }

        function toggleCart(show) {
            alert("Cart feature is active! Items: " + cart.length);
            // यहाँ आपका पुराना Cart Modal Logic आएगा
        }
    </script>
</body>
</html>
