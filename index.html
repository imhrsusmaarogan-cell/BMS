<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saffron Food POS</title>

<style>
:root {
--zomato-yellow: #ffd600;
--dark-bg: #121212;
--card-bg: #1e1e1e;
--text-main: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { background: #000; display: flex; justify-content: center; }

.app-container {
width: 100%;
max-width: 480px;
background: var(--dark-bg);
min-height: 100vh;
padding-bottom: 120px;
}

/* HEADER */
header {
background: rgba(255,255,255,0.05);
backdrop-filter: blur(20px);
padding: 20px;
text-align: center;
position: relative;
}

header h1 { color: #ff2e63; }

/* 3 DOT */
.menu-btn {
position: absolute;
right: 20px;
top: 20px;
font-size: 22px;
cursor: pointer;
}

.dropdown {
display: none;
position: absolute;
right: 20px;
top: 60px;
background: #222;
border-radius: 10px;
padding: 10px;
}

.dropdown p {
color: white;
padding: 10px;
cursor: pointer;
}

/* GRID */
.menu-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 15px;
padding: 15px;
}

.category-title {
color: gold;
padding: 15px;
}

/* CARD */
.menu-item {
background: rgba(255,255,255,0.05);
border-radius: 20px;
padding: 20px;
transition: 0.3s;
}

.menu-item:hover {
transform: scale(1.03);
box-shadow: 0 0 20px rgba(255,200,0,0.2);
}

.item-name { color: white; }
.price-text { color: gold; margin: 10px 0; }

.add-btn {
background: linear-gradient(45deg, gold, orange);
border: none;
padding: 10px;
border-radius: 10px;
font-weight: bold;
cursor: pointer;
}

/* CART */
.view-cart-trigger {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
width: 90%;
max-width: 440px;
background: linear-gradient(45deg, gold, orange);
padding: 15px;
border-radius: 30px;
text-align: center;
font-weight: bold;
}

</style>
</head>

<body>

<div class="app-container">

<header>
<h1>SAFFRON FOOD</h1>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div id="dropdown" class="dropdown">
<p>Settings</p>
<p>Orders</p>
<p>Logout</p>
</div>

</header>

<div id="menu-container"></div>

<div class="view-cart-trigger">
View Cart (<span id="cart-count">0</span>)
</div>

</div>

<script>
// YOUR LOGIC SAFE

const menuData = [
{ category: "APPETIZERS", items: [
{ id: 1, name: "Aloo tikki burger", price: 39 },
{ id: 2, name: "Classic veg burger", price: 49 }
]}
];

let cart = [];

function renderMenu() {
const container = document.getElementById('menu-container');
container.innerHTML = menuData.map(section => `
<h2 class="category-title">${section.category}</h2>
<div class="menu-grid">${section.items.map(item => `
<div class="menu-item">
<div class="item-name">${item.name}</div>
<div class="price-text">₹${item.price}</div>
<button class="add-btn" onclick="addToCart(${item.id})">Add</button>
</div>`).join('')}</div>`).join('');
}

function addToCart(id) {
const item = menuData[0].items.find(i => i.id === id);
cart.push(item);
document.getElementById('cart-count').innerText = cart.length;
}

/* MENU TOGGLE */
function toggleMenu() {
const menu = document.getElementById("dropdown");
menu.style.display = menu.style.display === "block" ? "none" : "block";
}

renderMenu();
</script>

</body>
</html>
