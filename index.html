<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saffron Food POS</title>
    <style>
        :root {
            --baby-pink: #fce4ec;
            --premium-pink: #f8bbd0;
            --sky-blue: #e3f2fd;
            --accent-blue: #0288d1;
            --zomato-yellow: #ffd600;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body { background-color: #000; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        .app-container {
            width: 100%; max-width: 480px; background-color: var(--dark-bg);
            min-height: 100vh; position: relative; padding-bottom: 120px;
        }

        header {
            background-color: var(--baby-pink); padding: 20px; text-align: center;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            color: #d81b60; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .category-title { color: var(--zomato-yellow); padding: 25px 15px 5px; font-size: 1.5rem; text-transform: uppercase; margin: 0 15px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }

        .menu-item {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 170px; transition: transform 0.2s ease; border: 1px solid transparent;
        }

        .menu-item:active { transform: scale(0.98); border-color: #333; }

        .item-name { color: var(--text-main); font-size: 1rem; font-weight: bold; margin-bottom: 10px; line-height: 1.3; }

        .price-text { color: var(--zomato-yellow); font-weight: 600; margin-bottom: 12px; font-size: 0.9rem; }

        .add-btn {
            background-color: var(--zomato-yellow); border: none; padding: 10px 20px;
            border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; font-size: 0.9rem;
        }

        .qty-selector { display: flex; align-items: center; gap: 15px; }

        .ctrl-btn {
            background-color: var(--zomato-yellow); border: none; width: 35px; height: 35px;
            border-radius: 8px; font-weight: bold; font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; color: #000;
        }

        .qty-display { color: white; font-weight: bold; font-size: 1.2rem; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }

        .modal-overlay.open { opacity: 1; }

        .compact-popup {
            background-color: var(--sky-blue); padding: 25px; border-radius: 25px;
            width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: scale(0.9); transition: transform 0.3s ease; border: 3px solid var(--baby-pink);
        }

        .modal-overlay.open .compact-popup { transform: scale(1); }

        .size-option {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px; background-color: white; border: 2px solid #eee;
            margin: 12px 0; border-radius: 15px; cursor: pointer; font-weight: bold; color: #333;
        }

        .size-option:active { background-color: var(--baby-pink); transform: translateY(2px); }

        #cart-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: flex-end;
            opacity: 0; transition: opacity 0.3s ease;
        }

        #cart-modal.open { opacity: 1; }

        .cart-content {
            background: var(--sky-blue); width: 100%; max-width: 480px;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 25px; max-height: 90vh; overflow-y: auto;
            transform: translateY(100%); transition: transform 0.3s ease;
        }

        #cart-modal.open .cart-content { transform: translateY(0); }

        .billing-box { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; color: #000; }

        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }

        .order-form input, .order-form select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; }

        .place-order-btn {
            background: #25d366; color: white; width: 100%; padding: 18px;
            border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }

        .view-cart-trigger {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 440px; background: var(--zomato-yellow);
            padding: 18px; border-radius: 15px; text-align: center; font-weight: bold;
            color: #000; z-index: 999; font-size: 1.1rem; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>SAFFRON FOOD</h1></header>
    <div id="menu-container"></div>
    <div class="view-cart-trigger" onclick="toggleCart(true)">
        View Cart (<span id="cart-count">0</span>)
    </div>
</div>

<div id="size-popup" class="modal-overlay" onclick="closeSizePopup(event)">
    <div class="compact-popup" onclick="event.stopPropagation()">
        <h3 id="popup-item-name" style="margin-bottom:20px; color:#d81b60;">Select Size</h3>
        <div id="size-options-list"></div>
        <button onclick="closeSizePopup()" style="margin-top:15px; background:none; border:none; color:#d81b60; font-weight:bold; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="cart-modal">
    <div class="cart-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; color:#0288d1;">
            <h2>SAFFRON FOOD</h2>
            <button onclick="toggleCart(false)" style="background:none; border:none; font-size:2rem; cursor:pointer;">✕</button>
        </div>
        <div class="billing-box" id="cart-items-container"></div>
        <div class="order-form">
            <p style="font-weight:bold; margin-bottom:8px; color:#333;">Customer Info (Internal):</p>
            <input type="text" id="cust-name" placeholder="Customer Name">
            <input type="tel" id="cust-phone" placeholder="WhatsApp Number (e.g. 91...)">
            <select id="order-type" onchange="toggleAddress()">
                <option value="Dining">Dining</option>
                <option value="Take Away">Take Away</option>
            </select>
            <input type="text" id="cust-address" placeholder="Delivery Address" style="display:none;">
            <select id="payment-method">
                <option value="Cash">Cash</option>
                <option value="Online">Online</option>
            </select>
            <div style="text-align:right; font-weight:bold; font-size:1.4rem; margin:15px 0; color:#000;">
                TOTAL: ₹<span id="grand-total">0</span>
            </div>
            <button class="place-order-btn" id="submit-btn" onclick="placeOrder()">Place Order ❣️</button>
        </div>
    </div>
</div>

<script>
    const menuData = [
        { category: "Appetizers", items: [
            { id: 1, name: "Aloo tikki burger", price: 39 }, { id: 2, name: "Classic veg burger", price: 49 },
            { id: 3, name: "Veg cheese burger", price: 59 }, { id: 4, name: "Double patty veg burger", price: 79 },
            { id: 5, name: "Saffron Burger", price: 99 }, { id: 6, name: "French fries", priceHalf: 45, priceFull: 79 },
            { id: 7, name: "Chilli potato", priceHalf: 59, priceFull: 109 }, { id: 8, name: "Honey chilli potato", priceHalf: 69, priceFull: 119 },
            { id: 9, name: "Plain Veg Noodles", priceHalf: 59, priceFull: 109 }, { id: 10, name: "Veg Hakka Noodles", priceHalf: 69, priceFull: 119 },
            { id: 11, name: "Veg Schezwan Noodles", priceHalf: 79, priceFull: 139 }, { id: 12, name: "Veg Chilli Garlic Noodle", priceHalf: 89, priceFull: 159 }
        ]},
        { category: "Sandwiches", items: [
            { id: 13, name: "Aloo Grilled sandwich", price: 49 }, { id: 14, name: "Veg grilled sandwich", price: 69 },
            { id: 15, name: "Veg cheese grilled sandwich", price: 79 }, { id: 16, name: "Cheese Corn Grilled Sandwich", price: 89 },
            { id: 17, name: "Paneer & cheese Grilled Sandwich", price: 99 }
        ]},
        { category: "Pasta", items: [{ id: 18, name: "veg Red souce pasta", price: 59 }, { id: 19, name: "veg white souce pasta", price: 69 }]},
        { category: "Momos", items: [
            { id: 20, name: "veg momos steam", priceHalf: 39, priceFull: 69 }, { id: 21, name: "veg momos fried", priceHalf: 49, priceFull: 79 },
            { id: 22, name: "paneer momos steam", priceHalf: 49, priceFull: 89 }, { id: 23, name: "paneer momos fried", priceHalf: 69, priceFull: 119 }
        ]},
        { category: "Maggi", items: [{ id: 24, name: "Plain maggi", price: 39 }, { id: 25, name: "Veg maggi", price: 49 }]},
        { category: "Rice", items: [
            { id: 26, name: "Veg fried rice", priceHalf: 59, priceFull: 109 }, { id: 27, name: "Classic spicy veg fried rice", priceHalf: 69, priceFull: 119 },
            { id: 28, name: "veg schezwan fried rice", priceHalf: 79, priceFull: 149 }
        ]},
        { category: "Paratha & More", items: [
            { id: 29, name: "Aloo paratha (2pc)", price: 49 }, { id: 30, name: "Aloo pyaz paratha (2pc)", price: 59 },
            { id: 31, name: "Gobhi paratha (2pc)", price: 69 }, { id: 32, name: "paneer paratha (2pc)", price: 79 },
            { id: 33, name: "Plain curd", price: 20 }, { id: 34, name: "Boondi Raita", price: 39 },
            { id: 35, name: "Cold coffee", price: 59 }, { id: 36, name: "Sweet lassi", price: 49 }
        ]}
    ];

    let cart = [];

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = menuData.map(section => `
            <h2 class="category-title">${section.category}</h2>
            <div class="menu-grid">${section.items.map(item => `
                <div class="menu-item">
                    <div class="item-name">${item.name}</div>
                    <div class="price-text">${item.priceHalf ? `H: ₹${item.priceHalf} / F: ₹${item.priceFull}` : `₹${item.price}`}</div>
                    <div class="action-area" id="ctrls-${item.id}"><button class="add-btn" onclick="handleItemClick(${item.id})">Add</button></div>
                </div>`).join('')}</div>`).join('');
    }

    function handleItemClick(id) {
        let itemRef; menuData.forEach(cat => { const found = cat.items.find(i => i.id === id); if(found) itemRef = found; });
        if (itemRef.priceHalf) openSizePopup(itemRef); else addToCart(id, 'Normal');
    }

    function openSizePopup(item) {
        document.getElementById('popup-item-name').innerText = item.name;
        document.getElementById('size-options-list').innerHTML = `
            <div class="size-option" onclick="selectFromPopup(${item.id}, 'Half')"><span>Half</span><span>₹${item.priceHalf}</span></div>
            <div class="size-option" onclick="selectFromPopup(${item.id}, 'Full')"><span>Full</span><span>₹${item.priceFull}</span></div>`;
        const overlay = document.getElementById('size-popup'); overlay.style.display = 'flex'; overlay.offsetHeight; overlay.classList.add('open');
    }

    function selectFromPopup(id, size) { addToCart(id, size); closeSizePopup(); }
    function closeSizePopup() { const overlay = document.getElementById('size-popup'); overlay.classList.remove('open'); setTimeout(() => { if (!overlay.classList.contains('open')) overlay.style.display = 'none'; }, 300); }

    function addToCart(id, size) {
        let itemRef; menuData.forEach(cat => { const found = cat.items.find(i => i.id === id); if(found) itemRef = found; });
        const price = size === 'Half' ? itemRef.priceHalf : (size === 'Full' ? itemRef.priceFull : itemRef.price);
        const cartKey = `${id}-${size}`;
        const existing = cart.find(c => c.cartKey === cartKey);
        if (existing) existing.qty++; else cart.push({ ...itemRef, size, price, qty: 1, cartKey });
        updateItemControls(id, size); updateCartUI();
    }

    function updateItemControls(id, size) {
        const container = document.getElementById(`ctrls-${id}`);
        const cartKey = `${id}-${size}`;
        const itemInCart = cart.find(c => c.cartKey === cartKey);
        if (itemInCart && itemInCart.qty > 0) {
            container.innerHTML = `<div class="qty-selector"><button class="ctrl-btn" onclick="updateQty('${cartKey}', -1)">-</button><span class="qty-display">${itemInCart.qty}</span><button class="ctrl-btn" onclick="updateQty('${cartKey}', 1)">+</button></div>`;
        } else {
            container.innerHTML = `<button class="add-btn" onclick="handleItemClick(${id})">Add</button>`;
        }
    }

    function updateQty(cartKey, delta) {
        const index = cart.findIndex(c => c.cartKey === cartKey);
        if (index > -1) {
            cart[index].qty += delta;
            const itemId = cart[index].id; const size = cart[index].size;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateItemControls(itemId, size);
        }
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items-container');
        let total = 0, count = 0;
        if (cart.length === 0) { container.innerHTML = "<p style='text-align:center; padding: 20px; color:#666;'>Cart is empty.</p>"; } 
        else {
            container.innerHTML = `<p style="font-weight:bold; margin-bottom:10px; color:#333;">Order summary:</p>` + 
            cart.map(item => {
                const subtotal = item.price * item.qty; total += subtotal; count += item.qty;
                return `<div class="cart-row"><div style="color:#000; font-size: 0.95rem;">${item.name}${item.size!=='Normal'?'('+item.size+')':''} x${item.qty} = ₹${subtotal}</div><div class="qty-selector"><button class="ctrl-btn" style="width:28px; height:28px;" onclick="updateQty('${item.cartKey}', -1)">-</button><span style="color:#000;">${item.qty}</span><button class="ctrl-btn" style="width:28px; height:28px;" onclick="updateQty('${item.cartKey}', 1)">+</button></div></div>`;
            }).join('');
        }
        document.getElementById('cart-count').innerText = count; document.getElementById('grand-total').innerText = total;
    }

    function toggleAddress() { document.getElementById('cust-address').style.display = (document.getElementById('order-type').value === 'Take Away') ? 'block' : 'none'; }
    function toggleCart(show) { 
        const modal = document.getElementById('cart-modal');
        if (show) { modal.style.display = 'flex'; modal.offsetHeight; modal.classList.add('open'); } 
        else { modal.classList.remove('open'); setTimeout(() => { if (!modal.classList.contains('open')) modal.style.display = 'none'; }, 300); }
    }

    // --- GOOGLE SHEETS INTEGRATION ---
    function placeOrder() {
        if (cart.length === 0) return;
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const type = document.getElementById('order-type').value;
        const addr = document.getElementById('cust-address').value || "N/A";
        const pay = document.getElementById('payment-method').value;
        const total = document.getElementById('grand-total').innerText;

        if (!phone || !name) { alert("Please fill Name and Phone."); return; }

        const btn = document.getElementById('submit-btn');
        btn.innerText = "Saving to Sheets...";
        btn.style.background = "#888";

        // Prepare data for Google Sheet
        const itemsSummary = cart.map(i => `${i.name}${i.size!=='Normal'?'('+i.size+')':''} x${i.qty}`).join(", ");
        const orderData = { name, phone, orderType: type, address: addr, payment: pay, total, items: itemsSummary };

        // Send to your Script URL
        fetch('https://script.google.com/macros/s/AKfycbyPOmqmx3q3YZceUk8XR4uQPgiWx4F8ZchcH7pZYmg-5FPkOwSeIlgzmND2zfaHUoc/exec', {
            method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData)
        });

        // Small delay so user sees "Saving" before WhatsApp opens
        setTimeout(() => {
            btn.innerText = "Place Order ❣️"; btn.style.background = "#25d366";
            let msg = `SAFFRON FOOD\n\nOrder summary:\n`;
            cart.forEach(item => { msg += `${item.name}${item.size!=='Normal'?'('+item.size+')':''} x${item.qty} = ₹${item.price * item.qty}\n`; });
            msg += `\nTOTAL: ₹${total}\nThanks for visiting ❣️`;
            window.open(`https://wa.me/${phone.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
        }, 1000);
    }

    renderMenu();
</script>
</body>
</html>
