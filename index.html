<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saffron Food POS</title>
    <style>
        :root {
            --baby-pink: #fce4ec;
            --sky-blue: #e3f2fd;
            --accent-blue: #0288d1;
            --zomato-yellow: #ffd600;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--dark-bg);
            min-height: 100vh;
            position: relative;
            padding-bottom: 100px;
        }

        header {
            background-color: var(--baby-pink);
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            color: #d81b60;
            font-weight: bold;
        }

        h2.category-title {
            color: var(--zomato-yellow);
            padding: 20px 15px 10px;
            font-size: 1.8rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .menu-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
        }

        .item-name {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .price-text {
            color: var(--zomato-yellow);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .action-area { height: 40px; display: flex; align-items: center; }

        .add-btn {
            background-color: var(--zomato-yellow);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            font-size: 0.9rem;
        }

        .qty-selector { display: flex; align-items: center; gap: 12px; }

        .ctrl-btn {
            background-color: var(--zomato-yellow);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
        }

        .qty-display { color: white; font-weight: bold; font-size: 1.1rem; }

        #cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }

        .cart-content {
            background: var(--sky-blue);
            width: 100%;
            max-width: 480px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 25px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .billing-box {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .cart-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .order-form input, .order-form select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .place-order-btn {
            background: #25d366;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .view-cart-trigger {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 440px;
            background: var(--zomato-yellow);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            color: #000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>SAFFRON FOOD</h1></header>
    
    <h2 class="category-title">Menu</h2>
    <div class="menu-grid" id="menu-grid"></div>

    <div class="view-cart-trigger" onclick="toggleCart(true)">
        View Cart (<span id="cart-count">0</span>)
    </div>
</div>

<div id="cart-modal">
    <div class="cart-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:#0288d1;">
            <h2 style="letter-spacing: 1px;">SAFFRON FOOD</h2>
            <button onclick="toggleCart(false)" style="background:none; border:none; font-size:1.5rem;">✕</button>
        </div>

        <div class="billing-box" id="cart-items-container"></div>

        <div class="order-form">
            <p style="font-weight:bold; margin-bottom:8px; color:#333;">Customer Details (Internal):</p>
            <input type="text" id="cust-name" placeholder="Customer Name">
            <input type="tel" id="cust-phone" placeholder="WhatsApp Number (e.g. 91...)">
            
            <select id="order-type" onchange="toggleAddress()">
                <option value="Dining">Dining</option>
                <option value="Take Away">Take Away</option>
            </select>

            <input type="text" id="cust-address" placeholder="Delivery Address" style="display:none;">

            <select id="payment-method">
                <option value="Cash">Cash</option>
                <option value="Online">Online</option>
            </select>

            <div style="text-align:right; font-weight:bold; font-size:1.2rem; margin:10px 0; color: #000;">
                TOTAL: ₹<span id="grand-total">0</span>
            </div>
            <button class="place-order-btn" onclick="placeOrder()">Place Order ❣️</button>
        </div>
    </div>
</div>

<script>
    const menuItems = [
        { id: 1, name: "Aloo tikki burger", price: 39 },
        { id: 2, name: "Veg fried rice", price: 109 },
        { id: 3, name: "veg schezwan fried rice", price: 149 },
        { id: 4, name: "Sweet lassi", price: 49 }
    ];

    let cart = [];

    function renderMenu() {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = menuItems.map(item => `
            <div class="menu-item">
                <div class="item-name">${item.name}</div>
                <div class="price-text">₹${item.price}</div>
                <div class="action-area" id="ctrls-${item.id}">
                    <button class="add-btn" onclick="handleInitialAdd(${item.id})">Add to Cart</button>
                </div>
            </div>`).join('');
    }

    function handleInitialAdd(id) {
        addToCart(id);
        updateItemControls(id);
    }

    function updateItemControls(id) {
        const container = document.getElementById(`ctrls-${id}`);
        if (!container) return;
        const itemInCart = cart.find(c => c.id === id);

        if (itemInCart && itemInCart.qty > 0) {
            container.innerHTML = `
                <div class="qty-selector">
                    <button class="ctrl-btn" onclick="updateQty(${id}, -1)">-</button>
                    <span class="qty-display">${itemInCart.qty}</span>
                    <button class="ctrl-btn" onclick="updateQty(${id}, 1)">+</button>
                </div>
            `;
        } else {
            container.innerHTML = `<button class="add-btn" onclick="handleInitialAdd(${id})">Add to Cart</button>`;
        }
    }

    function addToCart(id) {
        const item = menuItems.find(m => m.id === id);
        const existing = cart.find(c => c.id === id);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ ...item, qty: 1 });
        }
        updateCartUI();
    }

    function updateQty(id, delta) {
        const index = cart.findIndex(c => c.id === id);
        if (index > -1) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateItemControls(id);
        }
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items-container');
        const countSpan = document.getElementById('cart-count');
        const totalSpan = document.getElementById('grand-total');
        let total = 0, count = 0;

        if (cart.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#333;'>Your cart is empty</p>";
        } else {
            container.innerHTML = `<p style="font-weight:bold; margin-bottom:10px; color:#000;">Order sumary:</p>` + 
            cart.map(item => {
                const subtotal = item.price * item.qty;
                total += subtotal; count += item.qty;
                return `
                    <div class="cart-row">
                        <div style="color:#000">${item.name} x${item.qty} = ₹${subtotal}</div>
                        <div class="qty-selector">
                             <button class="ctrl-btn" style="width:25px; height:25px;" onclick="updateQty(${item.id}, -1)">-</button>
                             <button class="ctrl-btn" style="width:25px; height:25px;" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>`;
            }).join('');
        }
        countSpan.innerText = count;
        totalSpan.innerText = total;
    }

    function toggleAddress() {
        const type = document.getElementById('order-type').value;
        document.getElementById('cust-address').style.display = (type === 'Take Away') ? 'block' : 'none';
    }

    function toggleCart(show) {
        document.getElementById('cart-modal').style.display = show ? 'flex' : 'none';
    }

    function placeOrder() {
        if (cart.length === 0) return;
        const phone = document.getElementById('cust-phone').value;
        const total = document.getElementById('grand-total').innerText;

        if (!phone) { alert("Please enter WhatsApp number."); return; }
        
        // Exact format as requested (No customer details in message)
        let msg = `SAFFRON FOOD\n\n`;
        msg += `Order sumary:\n`;
        cart.forEach(item => {
            msg += `${item.name} x${item.qty} = ₹${item.price * item.qty}\n`;
        });
        msg += `\nTOTAL: ₹${total}\n`;
        msg += `Thanks for visiting ❣️`;

        const cleanPhone = phone.replace(/\D/g, '');
        window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    renderMenu();
</script>
</body>
</html>
