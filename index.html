<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saffron POS</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#000;color:#fff;display:flex;justify-content:center}
.app{width:100%;max-width:420px;min-height:100vh}

/* ✅ BABY PINK HEADER */
header{
text-align:center;
padding:15px;
background:#ffb6c1;
}
header h1{
color:#000;
font-size:18px;
letter-spacing:1px;
}

.container{padding:10px}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#151515;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.qtyBox{
display:flex;
align-items:center;
background:#222;
border-radius:20px;
padding:3px 6px;
gap:8px;
}

.qtyBox button{
background:#ffb6c1;
border:none;
color:#000;
width:28px;
height:28px;
border-radius:50%;
font-size:16px;
}

/* MODAL */
.modal{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
display:none;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:999;
}

/* ✅ SKY BLUE CART */
#cartModal .modal-box{
background:#87ceeb;
color:#000;
}

/* normal modal */
.modal-box{
background:#111;
padding:15px;
border-radius:12px;
width:90%;
max-width:400px;
max-height:90%;
overflow:auto;
}

/* CART */
.cartBox{
background:#e6f7ff;
border-radius:10px;
padding:10px;
margin-bottom:10px;
}

.cartRow{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
border-bottom:1px solid #ccc;
}

.cartRow:last-child{border:none}

button{
background:#ffb6c1;
border:none;
padding:10px;
border-radius:8px;
}

.cartBtn{
position:fixed;
bottom:20px;
right:20px;
padding:15px;
border-radius:50px;
background:#ffb6c1;
color:#000;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
background:#fff;
border:none;
color:#000;
border-radius:8px;
}
</style>
</head>

<body>

<div class="app">
<header><h1>SAFFRON FOOD</h1></header>
<div class="container" id="menu"></div>
</div>

<button class="cartBtn" onclick="openCart()">Cart</button>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="modal-box">

<h3>🛒 Cart</h3>

<div class="cartBox" id="cartItems"></div>

<h3>Total: ₹<span id="cartTotal">0</span></h3>

<input id="name" placeholder="Client Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">

<select id="payment">
<option>Cash</option>
<option>Online</option>
</select>

<input id="discount" type="number" placeholder="Discount %" oninput="calc()">

<button onclick="placeOrder()">PLACE ORDER</button>
<button onclick="closeCart()">Close</button>

</div>
</div>

<!-- TYPE -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Select Type</h3>
<button onclick="selectType('half')">Half</button>
<button onclick="selectType('full')">Full</button>
</div>
</div>

<script>

const modal = document.getElementById('modal');
const cartModal = document.getElementById('cartModal');

function openCart(){cartModal.style.display='flex';updateCart();calc();}
function closeCart(){cartModal.style.display='none';}

const menuDiv = document.getElementById('menu');
const phoneInput = document.getElementById('phone');

const menu=[
{name:"Aloo tikki burger",half:39,full:39},
{name:"Classic veg burger",half:49,full:49},
{name:"Veg cheese burger",half:59,full:59},
{name:"Double patty veg burger",half:79,full:79},
{name:"Saffron Burger",half:99,full:99},
{name:"French fries",half:45,full:79},
{name:"Chilli potato",half:59,full:109},
{name:"Honey chilli potato",half:69,full:119},
{name:"Plain Veg Noodles",half:59,full:109},
{name:"Veg Hakka Noodles",half:69,full:119},
{name:"Veg Schezwan Noodles",half:79,full:139},
{name:"Veg Chilli Garlic Noodle",half:89,full:159},
{name:"Aloo Grilled sandwich",half:49,full:49},
{name:"Veg grilled sandwich",half:69,full:69},
{name:"Veg cheese grilled sandwich",half:79,full:79},
{name:"Cheese Corn Grilled Sandwich",half:89,full:89},
{name:"Paneer & cheese Grilled Sandwich",half:99,full:99},
{name:"veg Red sauce pasta",half:59,full:59},
{name:"veg white sauce pasta",half:69,full:69},
{name:"veg momos steam",half:39,full:69},
{name:"veg momos fried",half:49,full:79},
{name:"paneer momos steam",half:49,full:89},
{name:"paneer momos fried",half:69,full:119},
{name:"Aloo paratha",half:49,full:49},
{name:"Aloo pyaz paratha",half:59,full:59},
{name:"Gobhi paratha",half:69,full:69},
{name:"paneer paratha",half:79,full:79},
{name:"Plain maggi",half:39,full:39},
{name:"Veg maggi",half:49,full:49},
{name:"Veg fried rice",half:59,full:109},
{name:"Classic spicy veg fried rice",half:69,full:119},
{name:"veg schezwan fried rice",half:79,full:149},
{name:"Cold coffee",half:59,full:59},
{name:"Sweet lassi",half:49,full:49}
];

let order={},selected;

function render(){
let html="";
menu.forEach((m,i)=>{
html+=`<div class='item'>
<div>${m.name}<br>₹${m.half}/${m.full}</div>
<div class="qtyBox">
<button onclick='dec(${i})'>-</button>
<span id='q${i}'>0</span>
<button onclick='add(${i})'>+</button>
</div>
</div>`;
});
menuDiv.innerHTML=html;
}

function add(i){
let m=menu[i];
if(m.half!==m.full){selected=i;modal.style.display='flex';}
else{if(!order[i]) order[i]={qty:0,type:'full'};order[i].qty++;update(i);}
}

function selectType(t){
if(!order[selected]) order[selected]={qty:0,type:t};
order[selected].qty++;
order[selected].type=t;
modal.style.display='none';
update(selected);
}

function dec(i){
if(order[i]){order[i].qty--;if(order[i].qty<=0) delete order[i];}
update(i);
}

function update(i){
document.getElementById('q'+i).innerText=order[i]?order[i].qty:0;
calc();updateCart();
}

function calc(){
let total=0;
Object.keys(order).forEach(i=>{
let m=menu[i],o=order[i];
let p=o.type==='full'?m.full:m.half;
total+=p*o.qty;
});
let d=parseFloat(document.getElementById('discount').value)||0;
total-=total*d/100;
document.getElementById('cartTotal').innerText=Math.round(total);
}

function updateCart(){
let html="";
Object.keys(order).forEach(i=>{
let m=menu[i],o=order[i];
html+=`
<div class="cartRow">
<span>${m.name} (${o.type})</span>
<div class="qtyBox">
<button onclick="dec(${i})">-</button>
<span>${o.qty}</span>
<button onclick="add(${i})">+</button>
</div>
</div>`;
});
document.getElementById('cartItems').innerHTML=html||"No items";
}

function placeOrder(){
let phone=phoneInput.value;
let total=document.getElementById('cartTotal').innerText;

let bill="SAFFRON FOOD\n\nOrder:\n";
Object.keys(order).forEach(i=>{
let m=menu[i],o=order[i];
let p=o.type==='full'?m.full:m.half;
bill+=`${m.name} x${o.qty} = ₹${p*o.qty}\n`;
});
bill+=`\nTOTAL: ₹${total}`;

window.location.href=`https://wa.me/91${phone}?text=${encodeURIComponent(bill)}`;

reset();closeCart();
}

function reset(){
order={};render();
document.getElementById('cartItems').innerHTML="";
document.getElementById('cartTotal').innerText=0;
}

render();

</script>

</body>
</html>
