<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Saffron Food - Order Online</title>
    <style>
        :root {
            --zomato-yellow: #ffd600;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --baby-pink: #fce4ec;
            --sky-blue: #e3f2fd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #000; color: white; min-height: 100vh; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 480px; background-color: var(--dark-bg); min-height: 100vh; position: relative; padding-bottom: 120px; margin: 0 auto; }

        header { background-color: var(--baby-pink); padding: 15px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; color: #d81b60; }
        header h1 { font-size: 1.6rem; font-weight: bold; text-transform: uppercase; }

        .category-title { color: var(--zomato-yellow); padding: 10px 15px; font-size: 1.2rem; text-transform: uppercase; border-bottom: 2px solid #333; margin-top: 10px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .menu-item { background: var(--card-bg); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #333; min-height: 150px; }
        
        .add-btn { background-color: var(--zomato-yellow); border: none; padding: 10px; border-radius: 12px; font-weight: bold; color: #000; margin-top: 10px; cursor: pointer; width: 100%; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .compact-popup { background-color: var(--sky-blue); padding: 25px; border-radius: 25px; width: 300px; text-align: center; color: #000; }
        
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: flex-end; }
        .cart-content { background: var(--sky-blue); width: 100%; max-width: 480px; border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 25px; color: #000; max-height: 85vh; overflow-y: auto; }

        .order-form input, .order-form select { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; }
        .place-order-btn { background: #25d366; color: white; width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }

        .view-cart-trigger { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 440px; background: var(--zomato-yellow); padding: 18px; border-radius: 20px; text-align: center; font-weight: bold; color: #000; z-index: 999; }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>SAFFRON FOOD</h1></header>
    <div id="menu-container"></div>
    <div class="view-cart-trigger" id="cart-float-btn" style="display:none;" onclick="toggleCart(true)">
        View Cart (<span id="cart-count">0</span>) - ₹<span id="float-total">0</span>
    </div>
</div>

<!-- Size Selection Popup -->
<div id="size-popup" class="modal-overlay" onclick="closeSizePopup()">
    <div class="compact-popup" onclick="event.stopPropagation()">
        <h3 id="popup-item-name" style="margin-bottom:20px; color:#d81b60;">Select Size</h3>
        <div id="size-options-list"></div>
        <button onclick="closeSizePopup()" style="margin-top:15px; background:none; border:none; font-weight:600;">Cancel</button>
    </div>
</div>

<!-- Cart Modal -->
<div id="cart-modal" class="modal-overlay" onclick="toggleCart(false)">
    <div class="cart-content" onclick="event.stopPropagation()">
        <h2 style="color:#d81b60; margin-bottom:15px;">Your Order</h2>
        <div id="cart-items-container" style="margin-bottom:15px;"></div>
        <div style="font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;">
            Total Payable: ₹<span id="grand-total">0</span>
        </div>

        <div class="order-form">
            <input type="text" id="cust-name" placeholder="Enter Your Name">
            <input type="tel" id="cust-phone" placeholder="WhatsApp Number">
            <select id="order-type" onchange="const a=document.getElementById('address-input'); a.style.display=(this.value==='Home Delivery')?'block':'none';">
                <option value="Dining">Dining</option>
                <option value="Take Away">Take Away</option>
                <option value="Home Delivery">Home Delivery 🛵</option>
            </select>
            <input type="text" id="address-input" style="display:none;" placeholder="Enter Your Full Address">
            <select id="payment-method">
                <option value="Online">Online</option>
                <option value="Cash">Cash</option>
            </select>
            <button class="place-order-btn" onclick="placeOrder()">Order via WhatsApp 🟢</button>
        </div>
    </div>
</div>

<script>
    const WHATSAPP_NUM = "918506996505";
    // आपका नया फिक्स किया हुआ URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRV-USefv2ri4XbOcKbq8kW_vz2A3_q5k5o_lX-lG-cNTnZW9iIkDDzfKl6U869yK8/exec";

    const menuData = [
        { category: "APPETIZERS", items: [
            { id: 1, name: "Aloo tikki burger", price: 39 },
            { id: 6, name: "French fries", priceHalf: 45, priceFull: 79 },
            { id: 7, name: "Chilli potato", priceHalf: 59, priceFull: 109 }
        ]}
    ];

    let cart = [];

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = menuData.map(section => `
            <h2 class="category-title">${section.category}</h2>
            <div class="menu-grid">${section.items.map(item => `
                <div class="menu-item">
                    <div style="font-weight:bold;">${item.name}</div>
                    <div style="color:var(--zomato-yellow);">${item.price ? '₹'+item.price : '₹'+item.priceHalf + ' / ₹'+item.priceFull}</div>
                    <button class="add-btn" onclick="handleItemClick(${item.id})">ADD</button>
                </div>`).join('')}</div>`).join('');
    }

    function handleItemClick(id) {
        let item; menuData.forEach(cat => { const found = cat.items.find(i => i.id === id); if(found) item = found; });
        if (item.priceHalf) openSizePopup(item); else addToCart(item, 'Normal', item.price);
    }

    function openSizePopup(item) {
        document.getElementById('popup-item-name').innerText = item.name;
        document.getElementById('size-options-list').innerHTML = `
            <button class="add-btn" onclick="addToCartById(${item.id}, 'Half', ${item.priceHalf})">Half - ₹${item.priceHalf}</button>
            <button class="add-btn" onclick="addToCartById(${item.id}, 'Full', ${item.priceFull})">Full - ₹${item.priceFull}</button>`;
        document.getElementById('size-popup').style.display = 'flex';
    }

    function addToCartById(id, size, price) {
        let item; menuData.forEach(cat => { const found = cat.items.find(i => i.id === id); if(found) item = found; });
        addToCart(item, size, price);
        closeSizePopup();
    }

    function addToCart(item, size, price) {
        const key = item.id + size;
        const existing = cart.find(c => c.key === key);
        if (existing) existing.qty++; else cart.push({ ...item, key, size, price, qty: 1 });
        updateCartUI();
    }

    function updateCartUI() {
        let total = 0, count = 0;
        const container = document.getElementById('cart-items-container');
        container.innerHTML = cart.map(c => {
            total += (c.price * c.qty); count += c.qty;
            return `<div style="display:flex; justify-content:space-between; padding:5px 0;">
                <span>${c.name} (${c.size}) x${c.qty}</span>
                <span>₹${c.price * c.qty}</span>
            </div>`;
        }).join('');
        
        document.getElementById('cart-count').innerText = count;
        document.getElementById('float-total').innerText = total;
        document.getElementById('grand-total').innerText = total;
        document.getElementById('cart-float-btn').style.display = count > 0 ? 'block' : 'none';
    }

    function toggleCart(show) { document.getElementById('cart-modal').style.display = show ? 'flex' : 'none'; }
    function closeSizePopup() { document.getElementById('size-popup').style.display = 'none'; }

    function placeOrder() {
        const name = document.getElementById('cust-name').value;
        const type = document.getElementById('order-type').value;
        const address = document.getElementById('address-input').value || "N/A";
        const finalTotal = document.getElementById('grand-total').innerText;

        if (!name) { alert("Please enter your name!"); return; }

        const orderDetails = cart.map(c => `${c.name}(${c.size})x${c.qty}`).join(', ');

        // --- GOOGLE SHEET SEND (Fixed GET Method) ---
        const params = `?name=${encodeURIComponent(name)}&order_details=${encodeURIComponent(orderDetails)}&grand_total=${encodeURIComponent(finalTotal)}&order_type=${encodeURIComponent(type)}&payment=${encodeURIComponent(document.getElementById('payment-method').value)}&address=${encodeURIComponent(address)}`;
        
        // Background में डेटा भेजने का सबसे सुरक्षित तरीका
        var img = new Image();
        img.src = SCRIPT_URL + params;

        // --- WHATSAPP MESSAGE ---
        let msg = `*New Order - Saffron Food*\n\n*Name:* ${name}\n*Order:* ${orderDetails}\n*Total:* ₹${finalTotal}\n*Type:* ${type}\n*Address:* ${address}`;
        window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
        
        setTimeout(() => { location.reload(); }, 2000);
    }

    renderMenu();
</script>
</body>
</html>
