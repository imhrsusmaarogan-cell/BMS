<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Saffron Food | Premium Dining</title>
    
    <style>
        :root {
            --gold: #ffcf5e;
            --dark-gold: #c5a059;
            --black-card: #1a1a1a;
            --deep-black: #0d0d0d;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: var(--deep-black); 
            color: var(--white);
            overflow-x: hidden;
        }

        .app-container { 
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto; 
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* Header Styling */
        header { 
            background: linear-gradient(145deg, #1a1a1a, #000);
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 1px solid var(--glass-border);
        }
        header h1 { 
            font-size: 1.8rem; 
            letter-spacing: 4px; 
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 207, 94, 0.3);
        }

        /* Search Bar Styling */
        .search-container { padding: 20px; }
        .search-wrapper { 
            display: flex; 
            align-items: center; 
            background: var(--glass); 
            border: 1px solid var(--glass-border);
            border-radius: 15px; 
            padding: 12px 18px;
            backdrop-filter: blur(10px);
        }
        .search-wrapper input { 
            background: transparent;
            border: none; 
            outline: none; 
            width: 100%; 
            color: var(--white);
            font-size: 16px; 
            margin-left: 10px; 
        }

        /* Menu Items Styling */
        .category-title { 
            color: var(--dark-gold); 
            padding: 25px 20px 10px; 
            font-size: 1.1rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 15px; 
        }

        .menu-item { 
            background: var(--black-card); 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid var(--glass-border);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-item:active { transform: scale(0.95); border-color: var(--gold); }

        .item-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 10px; opacity: 0.9; }
        .price-text { color: var(--gold); font-weight: bold; font-size: 1rem; }

        .add-btn { 
            background: transparent;
            border: 1px solid var(--dark-gold);
            color: var(--gold);
            padding: 8px; 
            border-radius: 10px; 
            margin-top: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Qty Controls */
        .qty-selector { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-top: 15px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 10px; 
            padding: 5px; 
        }
        .ctrl-btn { background: var(--gold); border: none; width: 30px; height: 30px; border-radius: 8px; font-weight: bold; }

        /* Floating Cart Button */
        .view-cart-trigger { 
            position: fixed; 
            bottom: 25px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            background: linear-gradient(90deg, var(--dark-gold), var(--gold));
            padding: 18px; 
            border-radius: 18px; 
            text-align: center; 
            font-weight: bold; 
            color: #000; 
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(255, 207, 94, 0.3);
        }

        /* Modal / Cart Styling */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 2000; 
            justify-content: center; align-items: flex-end; 
        }
        .cart-content { 
            background: #111; 
            width: 100%; 
            max-width: 480px; 
            border-radius: 30px 30px 0 0; 
            padding: 30px; 
            border-top: 2px solid var(--dark-gold);
        }
        
        .order-form input, .order-form select { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            background: #1a1a1a; border: 1px solid var(--glass-border); 
            border-radius: 12px; color: #fff; font-size: 16px; 
        }

        .place-order-btn { 
            background: #25d366; color: white; width: 100%; 
            padding: 18px; border: none; border-radius: 15px; 
            font-weight: bold; font-size: 1.1rem; 
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>SAFFRON FOOD</h1>
        <p style="font-size: 10px; color: var(--dark-gold); letter-spacing: 2px; margin-top: 5px;">A LUXURY TASTE EXPERIENCE</p>
    </header>

    <div class="search-container">
        <div class="search-wrapper">
            <span>🔍</span>
            <input type="text" id="menu-search" placeholder="What are you craving today?" onkeyup="filterMenu()">
        </div>
    </div>

    <div id="menu-container"></div>
    
    <div style="text-align:center; padding:50px 20px; opacity: 0.4;">
        <p>Managed by Saffron Luxury Kitchen</p>
    </div>

    <div class="view-cart-trigger" id="cart-float-btn" style="display:none;" onclick="toggleCart(true)">
        MY CART • ₹<span id="float-total">0</span>
    </div>
</div>

<!-- Size Selection -->
<div id="size-popup" class="modal-overlay" onclick="closeSizePopup()" style="align-items: center;">
    <div class="cart-content" style="border-radius: 25px; width: 320px; text-align: center;" onclick="event.stopPropagation()">
        <h3 id="popup-item-name" style="color: var(--gold); margin-bottom: 20px;">Select Portion</h3>
        <div id="size-options-list"></div>
    </div>
</div>

<!-- Cart Modal -->
<div id="cart-modal" class="modal-overlay" onclick="toggleCart(false)">
    <div class="cart-content" onclick="event.stopPropagation()">
        <h2 style="color: var(--gold); margin-bottom: 20px;">ORDER DETAILS</h2>
        <div id="cart-items-container" style="margin-bottom: 20px;"></div>
        
        <div class="order-form">
            <input type="text" id="cust-name" placeholder="Enter Your Name">
            <input type="tel" id="cust-phone" placeholder="WhatsApp Number">
            <select id="order-type">
                <option value="Dining">Dining</option>
                <option value="Take Away">Take Away</option>
            </select>
            <select id="payment-method">
                <option value="Online">Online Payment</option>
                <option value="Cash">Cash at Counter</option>
            </select>
            <div style="display: flex; justify-content: space-between; font-size: 1.4rem; margin: 20px 0;">
                <span>Total Bill</span>
                <span style="color: var(--gold);">₹<span id="grand-total">0</span></span>
            </div>
            <button class="place-order-btn" onclick="placeOrder()">CONFIRM ORDER ON WHATSAPP</button>
        </div>
    </div>
</div>

<script>
    const G_SCRIPT_URL = 'YOUR_GOOGLE_SCRIPT_URL'; // अपनी पुरानी URL यहाँ रहने दें
    const WHATSAPP_NUM = '918506996505'; // आपका नंबर यहाँ अपडेट कर दिया गया है

    const menuData = [
        { category: "SIGNATURE BURGERS", items: [
            { id: 1, name: "Aloo Tikki Burger", price: 39 },
            { id: 2, name: "Classic Veg Burger", price: 49 },
            { id: 3, name: "Veg Cheese Burger", price: 59 },
            { id: 4, name: "Double Patty Veg Burger", price: 79 },
            { id: 5, name: "Saffron Special Burger", price: 99 }
        ]},
        { category: "FRIES & STARTERS", items: [
            { id: 6, name: "French Fries", priceHalf: 45, priceFull: 79 },
            { id: 7, name: "Chilli Potato", priceHalf: 59, priceFull: 109 },
            { id: 8, name: "Honey Chilli Potato", priceHalf: 69, priceFull: 119 }
        ]},
        { category: "PASTA", items: [
            { id: 18, name: "Veg Red Sauce Pasta", price: 59 },
            { id: 19, name: "Veg White Sauce Pasta", price: 69 }
        ]},
        { category: "MOMOS", items: [
            { id: 20, name: "Veg Momos Steam", priceHalf: 39, priceFull: 69 },
            { id: 21, name: "Veg Momos Fried", priceHalf: 49, priceFull: 79 }
        ]}
        // ... बाकी के 37 आइटम्स यहाँ जुड़ते रहेंगे
    ];

    let cart = [];

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = menuData.map(section => `
            <h2 class="category-title">${section.category}</h2>
            <div class="menu-grid">${section.items.map(item => `
                <div class="menu-item">
                    <div class="item-name">${item.name}</div>
                    <div class="price-text">${item.priceHalf ? `₹${item.priceHalf} / ₹${item.priceFull}` : `₹${item.price}`}</div>
                    <div id="ctrls-${item.id}"><button class="add-btn" onclick="handleItemClick(${item.id})">ADD TO BAG</button></div>
                </div>`).join('')}</div>`).join('');
    }

    function handleItemClick(id) {
        let itemRef; menuData.forEach(cat => { const found = cat.items.find(i => i.id === id); if(found) itemRef = found; });
        if (itemRef.priceHalf) openSizePopup(itemRef); else addToCart(id, 'Normal');
    }

    function openSizePopup(item) {
        document.getElementById('popup-item-name').innerText = item.name;
        document.getElementById('size-options-list').innerHTML = `
            <div style="padding:15px; background:var(--black-card); border:1px solid var(--glass-border); border-radius:10px; margin-bottom:10px; cursor:pointer;" onclick="selectFromPopup(${item.id}, 'Half')">Half - ₹${item.priceHalf}</div>
            <div style="padding:15px; background:var(--black-card); border:1px solid var(--glass-border); border-radius:10px; cursor:pointer;" onclick="selectFromPopup(${item.id}, 'Full')">Full - ₹${item.priceFull}</div>`;
        document.getElementById('size-popup').style.display = 'flex';
    }

    function selectFromPopup(id, size) { addToCart(id, size); closeSizePopup(); }
    function closeSizePopup() { document.getElementById('size-popup').style.display = 'none'; }

    function addToCart(id, size) {
        let itemRef; menuData.forEach(cat => { const found = cat.items.find(i => i.id === id); if(found) itemRef = found; });
        const price = size === 'Half' ? itemRef.priceHalf : (size === 'Full' ? itemRef.priceFull : itemRef.price);
        const cartKey = `${id}-${size}`;
        const existing = cart.find(c => c.cartKey === cartKey);
        if (existing) existing.qty++; else cart.push({ ...itemRef, size, price, qty: 1, cartKey });
        updateItemControls(id, size); updateCartUI();
    }

    function updateItemControls(id, size) {
        const container = document.getElementById(`ctrls-${id}`);
        if(!container) return;
        const cartKey = `${id}-${size}`;
        const itemInCart = cart.find(c => c.cartKey === cartKey);
        if (itemInCart && itemInCart.qty > 0) {
            container.innerHTML = `<div class="qty-selector"><button class="ctrl-btn" onclick="updateQty('${cartKey}', -1)">-</button><span style="font-weight:bold;">${itemInCart.qty}</span><button class="ctrl-btn" onclick="updateQty('${cartKey}', 1)">+</button></div>`;
        } else {
            container.innerHTML = `<button class="add-btn" onclick="handleItemClick(${id})">ADD TO BAG</button>`;
        }
    }

    function updateQty(cartKey, delta) {
        const index = cart.findIndex(c => c.cartKey === cartKey);
        if (index > -1) {
            cart[index].qty += delta;
            const itemId = cart[index].id; const size = cart[index].size;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateItemControls(itemId, size);
        }
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items-container');
        const floatBtn = document.getElementById('cart-float-btn');
        let total = 0;
        if (cart.length === 0) { 
            container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Your bag is empty.</p>"; 
            floatBtn.style.display = 'none';
        } else {
            container.innerHTML = cart.map(item => {
                const subtotal = item.price * item.qty; total += subtotal;
                return `<div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom: 1px solid var(--glass-border); padding-bottom:10px;">
                    <div>${item.name} (${item.size}) x${item.qty}</div>
                    <div style="color:var(--gold)">₹${subtotal}</div>
                </div>`;
            }).join('');
            floatBtn.style.display = 'block';
        }
        document.getElementById('float-total').innerText = total;
        document.getElementById('grand-total').innerText = total;
    }

    function filterMenu() {
        const query = document.getElementById('menu-search').value.toLowerCase();
        const items = document.querySelectorAll('.menu-item');
        items.forEach(item => {
            const name = item.querySelector('.item-name').innerText.toLowerCase();
            item.parentElement.style.display = name.includes(query) ? "block" : "none";
        });
    }

    function toggleCart(show) { document.getElementById('cart-modal').style.display = show ? 'flex' : 'none'; }

    function placeOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const type = document.getElementById('order-type').value;
        const pay = document.getElementById('payment-method').value;
        const total = document.getElementById('grand-total').innerText;

        if (!name || !phone) { alert("Please complete your details"); return; }

        let msg = `*Saffron Food*\n`;
        msg += `*Order Summary*\n\n`;
        cart.forEach(item => {
            msg += `• ${item.name} (${item.size}) *${item.qty} = ₹${item.price * item.qty}\n`;
        });
        msg += `\n*Order type-* ${type}\n`;
        msg += `*Payment -* ${pay}\n`;
        msg += `*Total Amount:* ₹${total}`;

        // Send to WhatsApp
        window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
        
        // Data to Google Sheets (Optional Logic)
        fetch(G_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({name, phone, total, msg}) });

        setTimeout(() => { location.reload(); }, 2000);
    }

    renderMenu();
</script>

</body>
</html>
