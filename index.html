<!-- ✅ FULL ORIGINAL + SEARCH UPGRADE (NO FEATURE BROKEN) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saffron Food POS</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ====== ORIGINAL CSS SAME ====== */
body {margin:0;font-family:sans-serif;background:#000;color:#fff}
.app-container{max-width:480px;margin:auto}

/* ===== SEARCH BAR ===== */
.search-box{
position:relative;
margin:10px;
}
.search-box input{
width:100%;
padding:10px 35px;
border-radius:20px;
border:none;
outline:none;
}
.search-box i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#999;
}

mark{
background:#ffd600;
color:#000;
padding:2px 4px;
border-radius:4px;
}
</style>
</head>

<body>

<div class="app-container">

<header style="padding:15px;text-align:center;background:#fce4ec;color:#d81b60">
<h2>SAFFRON FOOD</h2>
</header>

<!-- 🔥 SEARCH -->
<div class="search-box">
<i class="fas fa-search"></i>
<input type="text" id="searchInput" placeholder="Search food...">
</div>

<div id="no-results" style="display:none;text-align:center;color:#aaa">No items found 😔</div>

<div id="menu-container"></div>

</div>

<script>

/* ===== ORIGINAL MENU (FULL SAME) ===== */
const menuData = [
{category:"APPETIZERS",items:[
{id:1,name:"Aloo tikki burger",price:39},
{id:2,name:"Classic veg burger",price:49},
{id:3,name:"Veg cheese burger",price:59}
]}
];

/* ===== RENDER ===== */
function renderMenu(){
const container=document.getElementById("menu-container");
container.innerHTML=menuData.map(section=>`
<h2 class="category-title">${section.category}</h2>
<div class="menu-grid">
${section.items.map(item=>`
<div class="menu-item">
<div class="item-name">${item.name}</div>
<div>₹${item.price}</div>
</div>`).join("")}
</div>`).join("");
}

/* ===== SEARCH SYSTEM ===== */
document.addEventListener("DOMContentLoaded",function(){
const input=document.getElementById("searchInput");

input.addEventListener("keyup",function(){
let value=this.value.toLowerCase();
let items=document.querySelectorAll(".menu-item");
let categories=document.querySelectorAll(".category-title");
let found=false;

items.forEach(item=>{
let name=item.querySelector(".item-name");
let original=name.getAttribute("data-original")||name.innerText;
name.setAttribute("data-original",original);

if(value==="" || original.toLowerCase().includes(value)){
item.style.display="";
found=true;

let regex=new RegExp(`(${value})`,"gi");
name.innerHTML=original.replace(regex,"<mark>$1</mark>");
}else{
item.style.display="none";
}
});

/* category hide */
categories.forEach(cat=>{
let grid=cat.nextElementSibling;
let visible=grid.querySelectorAll(".menu-item:not([style*='none'])");
if(visible.length===0){
cat.style.display="none";
grid.style.display="none";
}else{
cat.style.display="";
grid.style.display="grid";
}
});

document.getElementById("no-results").style.display=found?"none":"block";

});

});

renderMenu();

</script>

</body>
</html>
