<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Saffron Food POS - Seff-Tech</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="logo.jpeg">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== ORIGINAL CSS SAME ===== */
:root {
--baby-pink:#fce4ec;
--premium-pink:#f8bbd0;
--sky-blue:#e3f2fd;
--accent-blue:#0288d1;
--zomato-yellow:#ffd600;
--dark-bg:#121212;
--card-bg:#1e1e1e;
--text-main:#fff;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Roboto,sans-serif;}
body{background:#000;display:flex;justify-content:center;}
.app-container{width:100%;max-width:480px;background:var(--dark-bg);min-height:100vh;padding-bottom:120px;}

header{background:var(--baby-pink);padding:20px;text-align:center;color:#d81b60;font-weight:bold;}

/* ===== 🔥 SEARCH ADDED ===== */
.search-box{
position:relative;
width:90%;
margin:10px auto;
}
.search-box input{
width:100%;
padding:10px 35px;
border-radius:20px;
border:none;
outline:none;
}
.search-box i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#999;
}
mark{
background:#ffd600;
color:#000;
padding:2px 4px;
border-radius:4px;
}
#no-results{
display:none;
text-align:center;
color:#aaa;
padding:10px;
}

/* ===== REST ORIGINAL CSS ===== */
.category-title{color:var(--zomato-yellow);padding:20px 15px 5px;font-size:1.4rem;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:15px;}
.menu-item{background:var(--card-bg);border-radius:20px;padding:20px;}
.item-name{color:#fff;font-weight:bold;}
.price-text{color:var(--zomato-yellow);}

.add-btn{background:var(--zomato-yellow);border:none;padding:10px;border-radius:10px;}
.view-cart-trigger{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--zomato-yellow);padding:15px;border-radius:10px;color:#000;}
</style>
</head>

<body>

<div id="login-overlay">
<div class="login-box">
<h2>STAFF LOGIN</h2>
<input type="text" id="user-id" placeholder="User ID">
<input type="password" id="user-pass" placeholder="Password">
<button class="login-btn" onclick="checkLogin()">LOGIN</button>
<p id="login-error" style="color:red;display:none;">Invalid Credentials!</p>
</div>
</div>

<div class="app-container">
<header><h1>SAFFRON FOOD</h1></header>

<!-- 🔥 SEARCH -->
<div class="search-box">
<i class="fas fa-search"></i>
<input type="text" id="searchInput" placeholder="Search food...">
</div>

<div id="no-results">No items found 😔</div>

<div id="menu-container"></div>

<div class="view-cart-trigger" onclick="toggleCart(true)">
View Cart (<span id="cart-count">0</span>)
</div>
</div>

<script>

/* ===== LOGIN SAME ===== */
function checkLogin(){
const u=document.getElementById('user-id').value;
const p=document.getElementById('user-pass').value;
if(u==="Saffron"&&p==="258000"){
document.getElementById('login-overlay').style.display='none';
sessionStorage.setItem('isLoggedIn','true');
}else{
document.getElementById('login-error').style.display='block';
}
}
window.onload=function(){
if(sessionStorage.getItem('isLoggedIn')==='true'){
document.getElementById('login-overlay').style.display='none';
}
};

/* ===== FULL MENU SAME ===== */
const menuData = [...YOUR SAME DATA...]; // 👈 yaha apna full menuData paste karo (unchanged)

let cart=[];

/* ===== RENDER SAME ===== */
function renderMenu(){
const container=document.getElementById('menu-container');
container.innerHTML=menuData.map(section=>`
<h2 class="category-title">${section.category}</h2>
<div class="menu-grid">
${section.items.map(item=>`
<div class="menu-item">
<div class="item-name">${item.name}</div>
<div class="price-text">${item.priceHalf?`H: ₹${item.priceHalf}/F: ₹${item.priceFull}`:`₹${item.price}`}</div>
<div id="ctrls-${item.id}">
<button class="add-btn" onclick="handleItemClick(${item.id})">Add</button>
</div>
</div>`).join('')}
</div>`).join('');
}

/* ===== 🔥 ADVANCED SEARCH ===== */
document.addEventListener("DOMContentLoaded",function(){
const input=document.getElementById("searchInput");

input.addEventListener("keyup",function(){
let value=this.value.toLowerCase();
let items=document.querySelectorAll(".menu-item");
let categories=document.querySelectorAll(".category-title");
let found=false;

items.forEach(item=>{
let name=item.querySelector(".item-name");
let original=name.getAttribute("data-original")||name.innerText;
name.setAttribute("data-original",original);

if(value===""||original.toLowerCase().includes(value)){
item.style.display="";
found=true;

let regex=new RegExp(`(${value})`,"gi");
name.innerHTML=original.replace(regex,"<mark>$1</mark>");
}else{
item.style.display="none";
}
});

categories.forEach(cat=>{
let grid=cat.nextElementSibling;
let visible=grid.querySelectorAll(".menu-item:not([style*='none'])");
if(visible.length===0){
cat.style.display="none";
grid.style.display="none";
}else{
cat.style.display="";
grid.style.display="grid";
}
});

document.getElementById("no-results").style.display=found?"none":"block";
});
});

renderMenu();

</script>
</body>
</html>
