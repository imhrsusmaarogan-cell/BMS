<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Saffron Food - Seff-Tech</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Seff-Tech">
    <link rel="apple-touch-icon" href="logo.jpeg">

    <style>
        :root {
            --sky-blue-grad: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            --sky-blue-solid: #e3f2fd;
            --zomato-yellow: #ffd600;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --accent-blue: #0288d1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body { background-color: #000; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        .app-container {
            width: 100%; max-width: 480px; background-color: var(--dark-bg);
            min-height: 100vh; position: relative; padding-bottom: 120px;
        }

        /* NEW ATTRACTIVE SKY BLUE HEADER */
        header {
            background: var(--sky-blue-grad); 
            padding: 25px 20px; 
            text-align: center;
            border-bottom-left-radius: 30px; 
            border-bottom-right-radius: 30px;
            color: var(--accent-blue); 
            font-weight: 800; 
            box-shadow: 0 10px 20px rgba(2, 136, 209, 0.2);
            border-bottom: 3px solid #90caf9;
        }

        header h1 { font-size: 1.8rem; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }

        .category-title { color: var(--zomato-yellow); padding: 25px 15px 5px; font-size: 1.5rem; text-transform: uppercase; margin: 0 15px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }

        .menu-item {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 170px; transition: transform 0.2s ease; border: 1px solid transparent;
        }

        .item-name { color: var(--text-main); font-size: 1rem; font-weight: bold; margin-bottom: 10px; }

        .price-text { color: var(--zomato-yellow); font-weight: 600; margin-bottom: 12px; font-size: 0.9rem; }

        .add-btn {
            background-color: var(--zomato-yellow); border: none; padding: 10px 20px;
            border-radius: 10px; font-weight: bold; cursor: pointer; color: #000;
        }

        .qty-selector { display: flex; align-items: center; gap: 15px; }

        .ctrl-btn {
            background-color: var(--zomato-yellow); border: none; width: 35px; height: 35px;
            border-radius: 8px; font-weight: bold; font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; color: #000;
        }

        .qty-display { color: white; font-weight: bold; font-size: 1.2rem; }

        /* MODALS & POPUPS */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
        }

        .compact-popup {
            background-color: var(--sky-blue-solid); padding: 25px; border-radius: 25px;
            width: 300px; text-align: center; border: 3px solid #f8bbd0;
        }

        #cart-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: flex-end;
        }

        .cart-content {
            background: var(--sky-blue-solid); width: 100%; max-width: 480px;
            border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 25px;
        }

        .billing-box { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; color: #000; }

        /* Zoom Fix */
        .order-form input, .order-form select { 
            width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; 
        }

        .place-order-btn {
            background: #25d366; color: white; width: 100%; padding: 18px;
            border: none; border-radius: 15px; font-weight: bold; cursor: pointer;
        }

        .view-cart-trigger {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 440px; background: var(--zomato-yellow);
            padding: 18px; border-radius: 15px; text-align: center; font-weight: bold;
            color: #000; z-index: 999; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .powered-by { text-align: center; color: #555; padding: 20px; font-size: 0.8rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>SAFFRON FOOD</h1></header>
    
    <div id="menu-container"></div>
    
    <div class="powered-by">Powered by SEFF-TECH Solutions</div>
    
    <div class="view-cart-trigger" onclick="toggleCart(true)">
        View Cart (<span id="cart-count">0</span>)
    </div>
</div>

<div id="size-popup" class="modal-overlay" onclick="closeSizePopup()">
    <div class="compact-popup" onclick="event.stopPropagation()">
        <h3 id="popup-item-name" style="margin-bottom:20px; color:#d81b60;">Select Size</h3>
        <div id="size-options-list"></div>
        <button onclick="closeSizePopup()" style="margin-top:15px; background:none; border:none; color:#d81b60; font-weight:bold;">Cancel</button>
    </div>
</div>

<div id="cart-modal" class="modal-overlay" onclick="toggleCart(false)">
    <div class="cart-content" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; color:#0288d1;">
            <h2>SAFFRON FOOD</h2>
            <button onclick="toggleCart(false)" style="background:none; border:none; font-size:2rem;">✕</button>
        </div>
        <div class="billing-box" id="cart-items-container"></div>
        <div class="order-form">
            <input type="text" id="cust-name" placeholder="Customer Name">
            <input type="tel" id="cust-phone" placeholder="WhatsApp Number">
            <select id="order-type" onchange="toggleAddress()">
                <option value="Dining">Dining</option>
                <option value="Take Away">Take Away</option>
            </select>
            <input type="text" id="cust-address" placeholder="Delivery Address" style="display:none;">
            <select id="payment-method">
                <option value="Cash">Cash</option>
                <option value="Online">Online</option>
            </select>
            <div style="text-align:right; font-weight:bold; font-size:1.4rem; margin:15px 0; color:#000;">
                TOTAL: ₹<span id="grand-total">0</span>
            </div>
            <button class="place-order-btn" onclick="placeOrder()">Place Order ❣️</button>
        </div>
    </div>
</div>

<script>
    const menuData = [
        { category: "Appetizers", items: [
            { id: 1, name: "Aloo tikki burger", price: 39 }, { id: 2, name: "Classic veg burger", price: 49 },
            { id: 6, name: "French fries", priceHalf: 45, priceFull: 79 },
            { id: 7, name: "Chilli potato", priceHalf: 59, priceFull: 109 }
        ]},
        { category: "Rice", items: [
            { id: 26, name: "Veg fried rice", priceHalf: 59, priceFull: 109 }
        ]}
    ];

    let cart = [];

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = menuData.map(section => `
            <h2 class="category-title">${section.category}</h2>
            <div class="menu-grid">${section.items.map(item => `
                <div class="menu-item">
                    <div class="item-name">${item.name}</div>
                    <div class="price-text">${item.priceHalf ? `H: ₹${item.priceHalf} / F: ₹${item.priceFull}` : `₹${item.price}`}</div>
                    <div class="action-area" id="ctrls-${item.id}"><button class="add-btn" onclick="handleItemClick(${item.id})">Add</button></div>
                </div>`).join('')}</div>`).join('');
    }

    function handleItemClick(id) {
        let itemRef; menuData.forEach(cat => { const found = cat.items.find(i => i.id === id); if(found) itemRef = found; });
        if (itemRef.priceHalf) openSizePopup(itemRef); else addToCart(id, 'Normal');
    }

    function openSizePopup(item) {
        document.getElementById('popup-item-name').innerText = item.name;
        document.getElementById('size-options-list').innerHTML = `
            <div style="padding:15px; background:white; border-radius:10px; margin-bottom:10px; font-weight:bold;" onclick="selectFromPopup(${item.id}, 'Half')">Half - ₹${item.priceHalf}</div>
            <div style="padding:15px; background:white; border-radius:10px; font-weight:bold;" onclick="selectFromPopup(${item.id}, 'Full')">Full - ₹${item.priceFull}</div>`;
        document.getElementById('size-popup').style.display = 'flex';
    }

    function selectFromPopup(id, size) { addToCart(id, size); closeSizePopup(); }
    function closeSizePopup() { document.getElementById('size-popup').style.display = 'none'; }

    function addToCart(id, size) {
        let itemRef; menuData.forEach(cat => { const found = cat.items.find(i => i.id === id); if(found) itemRef = found; });
        const price = size === 'Half' ? itemRef.priceHalf : (size === 'Full' ? itemRef.priceFull : itemRef.price);
        const cartKey = `${id}-${size}`;
        const existing = cart.find(c => c.cartKey === cartKey);
        if (existing) existing.qty++; else cart.push({ ...itemRef, size, price, qty: 1, cartKey });
        updateItemControls(id, size); updateCartUI();
    }

    function updateItemControls(id, size) {
        const container = document.getElementById(`ctrls-${id}`);
        if(!container) return;
        const cartKey = `${id}-${size}`;
        const item = cart.find(c => c.cartKey === cartKey);
        if (item && item.qty > 0) {
            container.innerHTML = `<div class="qty-selector"><button class="ctrl-btn" onclick="updateQty('${cartKey}', -1)">-</button><span class="qty-display">${item.qty}</span><button class="ctrl-btn" onclick="updateQty('${cartKey}', 1)">+</button></div>`;
        } else {
            container.innerHTML = `<button class="add-btn" onclick="handleItemClick(${id})">Add</button>`;
        }
    }

    function updateQty(cartKey, delta) {
        const index = cart.findIndex(c => c.cartKey === cartKey);
        if (index > -1) {
            cart[index].qty += delta;
            const itemId = cart[index].id;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateItemControls(itemId, cart[index]?.size || 'Normal');
        }
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items-container');
        let total = 0, count = 0;
        if (cart.length === 0) { container.innerHTML = "<p style='text-align:center; padding:20px;'>Cart is empty.</p>"; } 
        else {
            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty); count += item.qty;
                return `<div class="cart-row"><span>${item.name} (${item.size}) x${item.qty}</span><span>₹${item.price * item.qty}</span></div>`;
            }).join('');
        }
        document.getElementById('cart-count').innerText = count;
        document.getElementById('grand-total').innerText = total;
    }

    function toggleAddress() { document.getElementById('cust-address').style.display = (document.getElementById('order-type').value === 'Take Away') ? 'block' : 'none'; }
    function toggleCart(show) { document.getElementById('cart-modal').style.display = show ? 'flex' : 'none'; }

    function placeOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        if (!name || !phone) { alert("Fill name and phone!"); return; }

        const scriptURL = 'https://script.google.com/macros/s/AKfycbyPOmqmx3q3YZceUk8XR4uQPgiWx4F8ZchcH7pZYmg-5FPkOwSeIlgzmND2zfaHUoc/exec';
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, phone, items: cart.map(i => i.name).join(", "), total: document.getElementById('grand-total').innerText }) });

        setTimeout(() => {
            window.open(`https://wa.me/${phone.replace(/\D/g, '')}?text=Order Placed!`, '_blank');
            location.reload(); // Fully reset for next order
        }, 100);
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    renderMenu();
</script>
</body>
</html>
