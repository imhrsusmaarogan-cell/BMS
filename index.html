<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium POS System</title>
    <style>
        :root {
            --baby-pink: #fce4ec;
            --sky-blue: #e3f2fd;
            --accent-blue: #0288d1;
            --zomato-yellow: #ffd600;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--dark-bg);
            min-height: 100vh;
            position: relative;
            padding-bottom: 100px;
        }

        header {
            background-color: var(--baby-pink);
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            color: #d81b60;
            font-weight: bold;
        }

        h2.category-title {
            color: var(--zomato-yellow);
            padding: 20px 15px 10px;
            font-size: 1.8rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .menu-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
        }

        .item-name {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .price-text {
            color: var(--zomato-yellow);
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .action-area {
            height: 40px;
            display: flex;
            align-items: center;
        }

        .add-btn {
            background-color: var(--zomato-yellow);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            font-size: 0.9rem;
        }

        .qty-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ctrl-btn {
            background-color: var(--zomato-yellow);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-display {
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
        }

        #cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: flex-end;
        }

        .cart-content {
            background: var(--sky-blue);
            width: 100%;
            max-width: 480px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 25px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .billing-box {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .cart-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .order-form input, .order-form select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .place-order-btn {
            background: #25d366;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .view-cart-trigger {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 440px;
            background: var(--zomato-yellow);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>PREMIUM POS</h1></header>
    
    <h2 class="category-title">Appetizers</h2>
    <div class="menu-grid" id="menu-grid"></div>

    <div class="view-cart-trigger" onclick="toggleCart(true)">
        View Cart (<span id="cart-count">0</span>)
    </div>
</div>

<div id="cart-modal">
    <div class="cart-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:#0288d1;">
            <h2>Bill Details</h2>
            <button onclick="toggleCart(false)" style="background:none; border:none; font-size:1.5rem;">✕</button>
        </div>

        <div class="billing-box" id="cart-items-container"></div>

        <div class="order-form">
            <input type="text" id="cust-name" placeholder="Name">
            <input type="text" id="cust-address" placeholder="Address">
            <input type="tel" id="cust-phone" placeholder="WhatsApp Number (With Country Code e.g. 91...)">
            <select id="payment-method">
                <option value="Cash">Cash</option>
                <option value="Online">Online</option>
            </select>
            <div style="text-align:right; font-weight:bold; font-size:1.2rem; margin:10px 0;">
                Total: ₹<span id="grand-total">0</span>
            </div>
            <button class="place-order-btn" onclick="placeOrder()">Place WhatsApp Order</button>
        </div>
    </div>
</div>

<script>
    const menuItems = [
        { id: 1, name: "Aloo tikki burger", price: 39, hasHalf: false },
        { id: 2, name: "Classic veg burger", price: 49, hasHalf: false },
        { id: 3, name: "Plain Veg Noodles", priceHalf: 59, priceFull: 109, hasHalf: true },
        { id: 4, name: "Veg Hakka Noodles", priceHalf: 69, priceFull: 119, hasHalf: true }
    ];

    let cart = [];

    function renderMenu() {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = menuItems.map(item => {
            if (item.hasHalf) {
                return `
                <div class="menu-item">
                    <div class="item-name">${item.name}</div>
                    <div class="price-text">Half ₹${item.priceHalf} / Full ₹${item.priceFull}</div>
                    <div class="action-area" id="ctrls-${item.id}">
                        <button class="add-btn" onclick="handleInitialAdd(${item.id}, 'Full')">Add to Cart</button>
                    </div>
                </div>`;
            } else {
                return `
                <div class="menu-item">
                    <div class="item-name">${item.name}</div>
                    <div class="price-text">₹${item.price}</div>
                    <div class="action-area" id="ctrls-${item.id}">
                        <button class="add-btn" onclick="handleInitialAdd(${item.id}, 'Normal')">Add to Cart</button>
                    </div>
                </div>`;
            }
        }).join('');
    }

    function handleInitialAdd(id, size) {
        addToCart(id, size);
        updateItemControls(id, size);
    }

    function updateItemControls(id, size) {
        const container = document.getElementById(`ctrls-${id}`);
        if (!container) return;
        const cartKey = `${id}-${size}`;
        const itemInCart = cart.find(c => c.cartKey === cartKey);

        if (itemInCart && itemInCart.qty > 0) {
            container.innerHTML = `
                <div class="qty-selector">
                    <button class="ctrl-btn" onclick="updateQty('${cartKey}', -1)">-</button>
                    <span class="qty-display">${itemInCart.qty}</span>
                    <button class="ctrl-btn" onclick="updateQty('${cartKey}', 1)">+</button>
                </div>
            `;
        } else {
            container.innerHTML = `<button class="add-btn" onclick="handleInitialAdd(${id}, '${size}')">Add to Cart</button>`;
        }
    }

    function addToCart(id, size) {
        const item = menuItems.find(m => m.id === id);
        const price = item.hasHalf ? (size === 'Half' ? item.priceHalf : item.priceFull) : item.price;
        const cartKey = `${id}-${size}`;
        
        const existing = cart.find(c => c.cartKey === cartKey);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ ...item, size, price, qty: 1, cartKey });
        }
        updateCartUI();
    }

    function updateQty(cartKey, delta) {
        const index = cart.findIndex(c => c.cartKey === cartKey);
        if (index > -1) {
            cart[index].qty += delta;
            const itemId = cart[index].id;
            const size = cart[index].size;
            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
                updateItemControls(itemId, size);
            } else {
                updateItemControls(itemId, size);
            }
        }
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items-container');
        const countSpan = document.getElementById('cart-count');
        const totalSpan = document.getElementById('grand-total');
        
        let total = 0;
        let count = 0;

        if (cart.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>Cart is empty</p>";
        } else {
            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                count += item.qty;
                return `
                    <div class="cart-row">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>₹${item.price} x ${item.qty}</small>
                        </div>
                        <div class="qty-selector">
                             <button class="ctrl-btn" style="width:25px; height:25px; color:black" onclick="updateQty('${item.cartKey}', -1)">-</button>
                             <span style="color:black">${item.qty}</span>
                             <button class="ctrl-btn" style="width:25px; height:25px; color:black" onclick="updateQty('${item.cartKey}', 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        countSpan.innerText = count;
        totalSpan.innerText = total;
    }

    function toggleCart(show) {
        document.getElementById('cart-modal').style.display = show ? 'flex' : 'none';
    }

    function placeOrder() {
        if (cart.length === 0) {
            alert("Please add items to cart first.");
            return;
        }

        const name = document.getElementById('cust-name').value;
        const addr = document.getElementById('cust-address').value;
        const phone = document.getElementById('cust-phone').value;
        const pay = document.getElementById('payment-method').value;
        const total = document.getElementById('grand-total').innerText;

        if (!phone) {
            alert("Please enter a WhatsApp number to send the order to.");
            return;
        }
        
        let msg = `*Order Details*\n`;
        msg += `*Name:* ${name || 'N/A'}\n`;
        msg += `*Address:* ${addr || 'N/A'}\n`;
        msg += `*Payment:* ${pay}\n`;
        msg += `--------------------------\n`;
        
        cart.forEach(item => {
            msg += `• ${item.name} (${item.size}) x${item.qty} - ₹${item.price * item.qty}\n`;
        });
        
        msg += `--------------------------\n`;
        msg += `*FINAL TOTAL BILL: ₹${total}*`;

        // Clean the phone number (remove non-digits)
        const cleanPhone = phone.replace(/\D/g, '');
        
        // WhatsApp API link with target number and message
        const waUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`;
        window.open(waUrl, '_blank');
    }

    renderMenu();
</script>
</body>
</html>
